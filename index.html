<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Tools</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Report Tools</h1>
<p class="subtitle">Convert old markup, create new report-highlights, or beautify tables.</p>

<div class="tabs">
  <button class="tab active" data-tab="convert">Convert</button>
  <button class="tab" data-tab="create">Create</button>
  <button class="tab" data-tab="table">Table Beautifier</button>
</div>

<!-- Convert section -->
<section id="convert-section" class="section">
  <div class="container">
    <div class="panel">
      <label for="convert-input">Old HTML</label>
      <textarea id="convert-input" spellcheck="false" placeholder="Paste the old content-box HTML here..."></textarea>
    </div>
    <div class="panel">
      <label for="convert-output">New HTML</label>
      <textarea id="convert-output" readonly spellcheck="false" placeholder="Converted HTML will appear here..."></textarea>
    </div>
  </div>
  <div class="actions">
    <button class="copy-btn" data-target="convert-output">Copy Output</button>
    <button class="clear-btn" data-input="convert-input" data-output="convert-output">Clear</button>
  </div>
</section>

<!-- Create section -->
<section id="create-section" class="section hidden">
  <div class="container">
    <div class="panel">
      <label for="create-input">Plain Text Brief</label>
      <textarea id="create-input" spellcheck="false" placeholder="Report Highlights: Your intro text here.&#10;&#10;● First bullet point&#10;● Second bullet point&#10;● Third bullet point"></textarea>
    </div>
    <div class="panel">
      <label for="create-output">Generated HTML</label>
      <textarea id="create-output" readonly spellcheck="false" placeholder="Generated HTML will appear here..."></textarea>
    </div>
  </div>
  <div class="actions">
    <button class="copy-btn" data-target="create-output">Copy Output</button>
    <button class="clear-btn" data-input="create-input" data-output="create-output">Clear</button>
  </div>
</section>

<!-- Table Beautifier section -->
<section id="table-section" class="section hidden">
  <div class="container">
    <div class="panel">
      <label for="table-input">Any HTML Table</label>
      <textarea id="table-input" spellcheck="false" placeholder="Paste any HTML &lt;table&gt; here..."></textarea>
    </div>
    <div class="panel">
      <label for="table-output">Beautified Table</label>
      <textarea id="table-output" readonly spellcheck="false" placeholder="Styled table will appear here..."></textarea>
    </div>
  </div>
  <div class="actions">
    <button class="copy-btn" data-target="table-output">Copy Output</button>
    <button class="clear-btn" data-input="table-input" data-output="table-output">Clear</button>
  </div>
</section>

<div class="toast" id="toast"></div>

<script>
  const toast = document.getElementById("toast");
  let toastTimer;

  function showToast(msg, isError) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.toggle("toast--error", !!isError);
    toast.classList.add("show");
    toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
  }

  // ── Tabs ──

  document.querySelectorAll(".tab").forEach((tab) => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
      tab.classList.add("active");

      document.querySelectorAll(".section").forEach((s) => s.classList.add("hidden"));
      document.getElementById(tab.dataset.tab + "-section").classList.remove("hidden");
    });
  });

  // ── Shared buttons ──

  document.querySelectorAll(".copy-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const text = document.getElementById(btn.dataset.target).value;
      if (!text) { showToast("Nothing to copy."); return; }
      navigator.clipboard.writeText(text).then(() => showToast("Copied!"));
    });
  });

  document.querySelectorAll(".clear-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const inputEl = document.getElementById(btn.dataset.input);
      const outputEl = document.getElementById(btn.dataset.output);
      inputEl.value = "";
      outputEl.value = "";
      inputEl.focus();
    });
  });

  // ── Flash effect on output update ──

  function flashOutput(el) {
    el.classList.remove("flash");
    void el.offsetWidth; // force reflow
    el.classList.add("flash");
  }

  // ── Convert ──

  function convert(html) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const container =
      doc.querySelector(".content-box__data") ||
      doc.querySelector(".content-box") ||
      doc.body;

    const allPs = container.querySelectorAll("p");
    let headerP = null;
    for (const p of allPs) {
      if (p.textContent.includes("Report Highlights")) {
        headerP = p;
        break;
      }
    }

    if (!headerP) {
      throw new Error('Could not find a paragraph containing "Report Highlights".');
    }

    const anchor = headerP.querySelector('a[name="report-highlights"]');
    if (anchor) anchor.remove();

    let headerHTML = headerP.innerHTML.trim();

    headerHTML = headerHTML.replace(
      /\s*<strong>\s*Report Highlights\s*<\/strong>\s*:\s*/i,
      "\n    <strong><u>Report Highlights</u>:</strong> "
    );

    headerHTML = headerHTML.replace(
      /\s*<u>\s*Report Highlights\s*<\/u>\s*:\s*/i,
      "\n    <strong><u>Report Highlights</u>:</strong> "
    );

    headerHTML = headerHTML.trimEnd();

    const ul = container.querySelector("ul");
    if (!ul) {
      throw new Error("Could not find the <ul> list.");
    }

    const listItems = ul.querySelectorAll("li");
    let liBlocks = "";

    listItems.forEach((li) => {
      const p = li.querySelector("p");
      const pHTML = p ? p.innerHTML.trim() : li.innerHTML.trim();

      liBlocks +=
        '    <li>\n' +
        '      <i class="icon-info"></i>\n' +
        '      <p>' + pHTML + '</p>\n' +
        '    </li>\n';
    });

    return (
      '<div class="report-highlights">\n' +
      '  <p class="report-highlights__header">' + headerHTML + '\n' +
      '  </p>\n' +
      '  <ul class="report-highlights__list">\n' +
      liBlocks +
      '  </ul>\n' +
      '</div>'
    );
  }

  function runConvert() {
    const inputEl = document.getElementById("convert-input");
    const outputEl = document.getElementById("convert-output");
    const raw = inputEl.value.trim();
    if (!raw) { outputEl.value = ""; return; }
    try {
      outputEl.value = convert(raw);
      flashOutput(outputEl);
    } catch (e) {
      outputEl.value = "";
    }
  }

  // ── Create ──

  function create(text) {
    const lines = text.split("\n").map((l) => l.trim()).filter((l) => l.length > 0);

    if (lines.length === 0) {
      throw new Error("Input is empty.");
    }

    let firstLine = lines[0];
    let intro = "";

    const headerMatch = firstLine.match(/^Report Highlights\s*:\s*(.*)/i);
    if (headerMatch) {
      intro = headerMatch[1].trim();
    } else {
      intro = firstLine.replace(/^[●•*\-]\s*/, "").trim();
    }

    const items = lines.slice(headerMatch ? 1 : 0);
    const bulletItems = items
      .map((l) => l.replace(/^[●•*\-]\s*/, "").trim())
      .filter((l) => l.length > 0);

    if (bulletItems.length === 0) {
      throw new Error("No list items found.");
    }

    let headerContent = "\n    <strong><u>Report Highlights</u>:</strong>";
    if (intro) {
      headerContent += " " + intro;
    }

    let liBlocks = "";
    bulletItems.forEach((item) => {
      liBlocks +=
        '    <li>\n' +
        '      <i class="icon-info"></i>\n' +
        '      <p>' + item + '</p>\n' +
        '    </li>\n';
    });

    return (
      '<div class="report-highlights">\n' +
      '  <p class="report-highlights__header">' + headerContent + '\n' +
      '  </p>\n' +
      '  <ul class="report-highlights__list">\n' +
      liBlocks +
      '  </ul>\n' +
      '</div>'
    );
  }

  function runCreate() {
    const inputEl = document.getElementById("create-input");
    const outputEl = document.getElementById("create-output");
    const raw = inputEl.value.trim();
    if (!raw) { outputEl.value = ""; return; }
    try {
      outputEl.value = create(raw);
      flashOutput(outputEl);
    } catch (e) {
      outputEl.value = "";
    }
  }

  // ── Table Beautifier ──

  function beautifyTable(html) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");
    const table = doc.querySelector("table");

    if (!table) {
      throw new Error("Could not find a <table> element.");
    }

    // Extract header cells
    const headers = [];
    const thEls = table.querySelectorAll("thead th, thead td, tr:first-child th");
    thEls.forEach((th) => headers.push(th.textContent.trim()));

    // If no thead, check if first row has <th> or looks like a header
    let bodyRows;
    if (headers.length > 0) {
      bodyRows = table.querySelectorAll("tbody tr");
      if (bodyRows.length === 0) {
        // No explicit tbody — grab all rows after the first
        const allRows = table.querySelectorAll("tr");
        bodyRows = Array.from(allRows).slice(1);
      }
    } else {
      // No thead or <th> — treat first row as header
      const allRows = table.querySelectorAll("tr");
      if (allRows.length === 0) throw new Error("Table has no rows.");
      const firstRow = allRows[0];
      firstRow.querySelectorAll("td, th").forEach((c) => headers.push(c.textContent.trim()));
      bodyRows = Array.from(allRows).slice(1);
    }

    if (headers.length === 0) throw new Error("Could not determine table headers.");

    // Extract body data (preserve innerHTML for links, bold, etc.)
    const rows = [];
    bodyRows.forEach((tr) => {
      const cells = [];
      tr.querySelectorAll("td, th").forEach((c) => cells.push(c.innerHTML.trim()));
      if (cells.length > 0) rows.push(cells);
    });

    // Style constants
    const TABLE = 'border-collapse: collapse; width: 100%; margin: 0 auto 20px auto; border-left: 4px solid #C59925;';
    const TR_HEAD = 'background: #2a2a2a;';
    const TH = 'padding: 12px 15px; text-align: center; color: #D44B3E; font-weight: 600; border-bottom: 1px solid #444;';
    const BG_ODD = '#252525';
    const BG_EVEN = '#1e1e1e';
    const BORDER_BOTTOM = ' border-bottom: 1px solid #333;';

    // Build output
    let out = '<table style="' + TABLE + '">\n';

    // thead
    out += '  <thead>\n    <tr style="' + TR_HEAD + '">\n';
    headers.forEach((h) => {
      out += '      <th style="' + TH + '">' + h + '</th>\n';
    });
    out += '    </tr>\n  </thead>\n';

    // tbody
    out += '  <tbody>\n';
    rows.forEach((cells, i) => {
      const bg = i % 2 === 0 ? BG_ODD : BG_EVEN;
      const isLast = i === rows.length - 1;
      const border = isLast ? '' : BORDER_BOTTOM;

      out += '    <tr>\n';
      cells.forEach((cell) => {
        out += '      <td style="padding: 12px 15px; text-align: center; background: ' + bg + ';' + border + '">' + cell + '</td>\n';
      });
      out += '    </tr>\n';
    });
    out += '  </tbody>\n</table>';

    return out;
  }

  function runTable() {
    const inputEl = document.getElementById("table-input");
    const outputEl = document.getElementById("table-output");
    const raw = inputEl.value.trim();
    if (!raw) { outputEl.value = ""; return; }
    try {
      outputEl.value = beautifyTable(raw);
      flashOutput(outputEl);
    } catch (e) {
      outputEl.value = "";
    }
  }

  // ── Auto-refresh on input change ──

  document.getElementById("convert-input").addEventListener("input", runConvert);
  document.getElementById("create-input").addEventListener("input", runCreate);
  document.getElementById("table-input").addEventListener("input", runTable);

</script>

</body>
</html>
