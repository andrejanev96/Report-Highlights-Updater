<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Report Highlights Tool</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>Report Highlights Tool</h1>
<p class="subtitle">Convert old markup or create new report-highlights HTML from scratch.</p>

<div class="tabs">
  <button class="tab active" data-tab="convert">Convert</button>
  <button class="tab" data-tab="create">Create</button>
</div>

<!-- Convert section -->
<section id="convert-section" class="section">
  <div class="container">
    <div class="panel">
      <label for="convert-input">Old HTML</label>
      <textarea id="convert-input" spellcheck="false" placeholder="Paste the old content-box HTML here..."></textarea>
    </div>
    <div class="panel">
      <label for="convert-output">New HTML</label>
      <textarea id="convert-output" readonly spellcheck="false" placeholder="Converted HTML will appear here..."></textarea>
    </div>
  </div>
  <div class="actions">
    <button id="convertBtn">Convert</button>
    <button class="copy-btn" data-target="convert-output">Copy Output</button>
    <button class="clear-btn" data-input="convert-input" data-output="convert-output">Clear</button>
  </div>
</section>

<!-- Create section -->
<section id="create-section" class="section hidden">
  <div class="container">
    <div class="panel">
      <label for="create-input">Plain Text Brief</label>
      <textarea id="create-input" spellcheck="false" placeholder="Report Highlights: Your intro text here.&#10;&#10;● First bullet point&#10;● Second bullet point&#10;● Third bullet point"></textarea>
    </div>
    <div class="panel">
      <label for="create-output">Generated HTML</label>
      <textarea id="create-output" readonly spellcheck="false" placeholder="Generated HTML will appear here..."></textarea>
    </div>
  </div>
  <div class="actions">
    <button id="generateBtn">Generate</button>
    <button class="copy-btn" data-target="create-output">Copy Output</button>
    <button class="clear-btn" data-input="create-input" data-output="create-output">Clear</button>
  </div>
</section>

<div class="toast" id="toast"></div>

<script>
  const toast = document.getElementById("toast");
  let toastTimer;

  function showToast(msg, isError) {
    clearTimeout(toastTimer);
    toast.textContent = msg;
    toast.classList.toggle("toast--error", !!isError);
    toast.classList.add("show");
    toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
  }

  // ── Tabs ──

  document.querySelectorAll(".tab").forEach((tab) => {
    tab.addEventListener("click", () => {
      document.querySelectorAll(".tab").forEach((t) => t.classList.remove("active"));
      tab.classList.add("active");

      document.querySelectorAll(".section").forEach((s) => s.classList.add("hidden"));
      document.getElementById(tab.dataset.tab + "-section").classList.remove("hidden");
    });
  });

  // ── Shared buttons ──

  document.querySelectorAll(".copy-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const text = document.getElementById(btn.dataset.target).value;
      if (!text) { showToast("Nothing to copy."); return; }
      navigator.clipboard.writeText(text).then(() => showToast("Copied!"));
    });
  });

  document.querySelectorAll(".clear-btn").forEach((btn) => {
    btn.addEventListener("click", () => {
      const inputEl = document.getElementById(btn.dataset.input);
      const outputEl = document.getElementById(btn.dataset.output);
      inputEl.value = "";
      outputEl.value = "";
      inputEl.focus();
    });
  });

  // ── Flash effect on output update ──

  function flashOutput(el) {
    el.classList.remove("flash");
    void el.offsetWidth; // force reflow
    el.classList.add("flash");
  }

  // ── Convert ──

  function convert(html) {
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");

    const container =
      doc.querySelector(".content-box__data") ||
      doc.querySelector(".content-box") ||
      doc.body;

    const allPs = container.querySelectorAll("p");
    let headerP = null;
    for (const p of allPs) {
      if (p.textContent.includes("Report Highlights")) {
        headerP = p;
        break;
      }
    }

    if (!headerP) {
      throw new Error('Could not find a paragraph containing "Report Highlights".');
    }

    const anchor = headerP.querySelector('a[name="report-highlights"]');
    if (anchor) anchor.remove();

    let headerHTML = headerP.innerHTML.trim();

    headerHTML = headerHTML.replace(
      /\s*<strong>\s*Report Highlights\s*<\/strong>\s*:\s*/i,
      "\n    <strong><u>Report Highlights</u>:</strong> "
    );

    headerHTML = headerHTML.replace(
      /\s*<u>\s*Report Highlights\s*<\/u>\s*:\s*/i,
      "\n    <strong><u>Report Highlights</u>:</strong> "
    );

    headerHTML = headerHTML.trimEnd();

    const ul = container.querySelector("ul");
    if (!ul) {
      throw new Error("Could not find the <ul> list.");
    }

    const listItems = ul.querySelectorAll("li");
    let liBlocks = "";

    listItems.forEach((li) => {
      const p = li.querySelector("p");
      const pHTML = p ? p.innerHTML.trim() : li.innerHTML.trim();

      liBlocks +=
        '    <li>\n' +
        '      <i class="icon-info"></i>\n' +
        '      <p>' + pHTML + '</p>\n' +
        '    </li>\n';
    });

    return (
      '<div class="report-highlights">\n' +
      '  <p class="report-highlights__header">' + headerHTML + '\n' +
      '  </p>\n' +
      '  <ul class="report-highlights__list">\n' +
      liBlocks +
      '  </ul>\n' +
      '</div>'
    );
  }

  function runConvert() {
    const inputEl = document.getElementById("convert-input");
    const outputEl = document.getElementById("convert-output");
    const raw = inputEl.value.trim();
    if (!raw) { outputEl.value = ""; return; }
    try {
      outputEl.value = convert(raw);
      flashOutput(outputEl);
    } catch (e) {
      outputEl.value = "";
    }
  }

  document.getElementById("convertBtn").addEventListener("click", () => {
    const raw = document.getElementById("convert-input").value.trim();
    if (!raw) { showToast("Paste some HTML first."); return; }
    try {
      const outputEl = document.getElementById("convert-output");
      outputEl.value = convert(raw);
      flashOutput(outputEl);
      showToast("Converted!");
    } catch (e) {
      document.getElementById("convert-output").value = "";
      showToast("Error: " + e.message, true);
    }
  });

  // ── Create ──

  function create(text) {
    const lines = text.split("\n").map((l) => l.trim()).filter((l) => l.length > 0);

    if (lines.length === 0) {
      throw new Error("Input is empty.");
    }

    let firstLine = lines[0];
    let intro = "";

    const headerMatch = firstLine.match(/^Report Highlights\s*:\s*(.*)/i);
    if (headerMatch) {
      intro = headerMatch[1].trim();
    } else {
      intro = firstLine.replace(/^[●•*\-]\s*/, "").trim();
    }

    const items = lines.slice(headerMatch ? 1 : 0);
    const bulletItems = items
      .map((l) => l.replace(/^[●•*\-]\s*/, "").trim())
      .filter((l) => l.length > 0);

    if (bulletItems.length === 0) {
      throw new Error("No list items found.");
    }

    let headerContent = "\n    <strong><u>Report Highlights</u>:</strong>";
    if (intro) {
      headerContent += " " + intro;
    }

    let liBlocks = "";
    bulletItems.forEach((item) => {
      liBlocks +=
        '    <li>\n' +
        '      <i class="icon-info"></i>\n' +
        '      <p>' + item + '</p>\n' +
        '    </li>\n';
    });

    return (
      '<div class="report-highlights">\n' +
      '  <p class="report-highlights__header">' + headerContent + '\n' +
      '  </p>\n' +
      '  <ul class="report-highlights__list">\n' +
      liBlocks +
      '  </ul>\n' +
      '</div>'
    );
  }

  function runCreate() {
    const inputEl = document.getElementById("create-input");
    const outputEl = document.getElementById("create-output");
    const raw = inputEl.value.trim();
    if (!raw) { outputEl.value = ""; return; }
    try {
      outputEl.value = create(raw);
      flashOutput(outputEl);
    } catch (e) {
      outputEl.value = "";
    }
  }

  document.getElementById("generateBtn").addEventListener("click", () => {
    const raw = document.getElementById("create-input").value.trim();
    if (!raw) { showToast("Paste your brief first."); return; }
    try {
      const outputEl = document.getElementById("create-output");
      outputEl.value = create(raw);
      flashOutput(outputEl);
      showToast("Generated!");
    } catch (e) {
      document.getElementById("create-output").value = "";
      showToast("Error: " + e.message, true);
    }
  });

  // ── Auto-refresh on input change ──

  document.getElementById("convert-input").addEventListener("input", runConvert);
  document.getElementById("create-input").addEventListener("input", runCreate);

  // ── Keyboard shortcut: Cmd/Ctrl+Enter ──

  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) {
      e.preventDefault();
      const convertSection = document.getElementById("convert-section");
      if (!convertSection.classList.contains("hidden")) {
        document.getElementById("convertBtn").click();
      } else {
        document.getElementById("generateBtn").click();
      }
    }
  });
</script>

</body>
</html>
